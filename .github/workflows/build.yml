name: build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # required to create/upload the per-run prerelease that
                   # carries each build's tarballs (replaces upload-artifact
                   # to escape the per-repo Actions storage quota).

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Decides whether the heavy code-server job needs to actually rebuild.
  # The vscode compile takes 1-3 hours on the contabo runner (swap-thrashing),
  # so we skip it whenever the push leaves code-server/** untouched and
  # republish the previous release's code-server-dist.tar.gz instead.
  #
  # Forces a build when:
  #   - workflow_dispatch / non-push event (manual = trust user intent)
  #   - first push to a branch (BEFORE is the null sha)
  #   - any code-server/** file in the diff
  #   - no prior CI prerelease has code-server-dist.tar.gz (bootstrap)
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code-server: ${{ steps.f.outputs.code-server }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: f
        env:
          EVENT: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          decide() {
            if [ "$EVENT" != "push" ]; then
              echo "build (event=$EVENT, manual dispatch)" >&2
              echo build; return
            fi
            case "$BEFORE" in
              ''|'0000000000000000000000000000000000000000')
                echo "build (first push, no prior commit)" >&2
                echo build; return ;;
            esac
            if git diff --name-only "$BEFORE" HEAD 2>/dev/null | grep -q '^code-server/'; then
              echo "build (code-server/** touched in this push)" >&2
              echo build; return
            fi
            # No code-server/** changes — check for a prior release to republish from.
            for t in $(gh release list --repo "$GITHUB_REPOSITORY" -L 30 \
                         --json tagName,isPrerelease \
                         -q '.[] | select(.isPrerelease and (.tagName | startswith("ci-"))) | .tagName'); do
              if gh release view "$t" --repo "$GITHUB_REPOSITORY" --json assets \
                   -q '[.assets[].name][]' 2>/dev/null | grep -qx 'code-server-dist.tar.gz'; then
                echo "skip (will republish from $t)" >&2
                echo skip; return
              fi
            done
            echo "build (no prior release has code-server-dist.tar.gz — bootstrap)" >&2
            echo build
          }
          decision=$(decide)
          if [ "$decision" = "build" ]; then
            echo "code-server=true"  >> "$GITHUB_OUTPUT"
          else
            echo "code-server=false" >> "$GITHUB_OUTPUT"
          fi

  # Bundles the deploy/ subdir (Authentik docker compose, provision.sh, systemd
  # templates) so the install-openclaw-cluster.sh script — distributed via gist
  # and piped to bash on a bare server — can fetch everything it needs from
  # CI artifacts without expecting a local repo checkout.
  sandbox-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Package deploy/
        run: |
          tar -czf "$GITHUB_WORKSPACE/sandbox-deploy.tar.gz" deploy
      - name: Publish to per-run prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ci-${{ github.run_id }}
        run: |
          set -euo pipefail
          # All four jobs race to create the same release; first wins,
          # others see "already exists" and proceed to upload.
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --prerelease \
                 --target "$GITHUB_SHA" \
                 --title  "CI build ${{ github.run_id }} ($GITHUB_SHA)" \
                 --notes  "Auto-published build artifacts. Pulled by deploy/install-openclaw-cluster.sh."
          gh release upload "$TAG" "$GITHUB_WORKSPACE/sandbox-deploy.tar.gz" \
            --repo "$GITHUB_REPOSITORY" --clobber

  openclaw:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: openclaw
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.0

      # No `cache:` — openclaw/pnpm-lock.yaml isn't committed and the cache
      # action errors out when the dependency path is absent.
      - uses: actions/setup-node@v4
        with:
          node-version: '22.16'

      # pnpm-workspace.yaml sets minimumReleaseAge: 2880, which requires the
      # registry "time" field on every resolved package. npm_config_ env
      # overrides do not apply to workspace YAML in pnpm 11, so we sed-strip
      # the line in CI only.
      - name: Disable minimumReleaseAge for CI
        run: |
          sed -i '/^minimumReleaseAge:/d' pnpm-workspace.yaml
          sed -i '/^minimumReleaseAgeExclude:/,/^[^[:space:]-]/{/^[[:space:]-]/d; /^minimumReleaseAgeExclude:/d}' pnpm-workspace.yaml || true
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build

      # `pnpm build` does NOT build the Control UI; without this the gateway
      # serves a stub UI and the user's custom tabs (editor, task tracker)
      # are missing. Build it explicitly into ui/dist/.
      - name: Build Control UI
        run: |
          pnpm ui:install || true
          pnpm ui:build

      # dist/ imports runtime externals like `json5`. Re-install with --prod
      # so node_modules only contains what production needs, then tar it
      # alongside dist/. -h dereferences pnpm's symlinks for a portable
      # archive.
      - name: Install prod node_modules
        env:
          NODE_ENV: production
        run: pnpm install --no-frozen-lockfile --prod

      - name: Package
        run: |
          # pnpm --prod left dangling .bin symlinks (devDep entries) which
          # break `tar -h`. Sweep them first.
          find node_modules -xtype l -delete 2>/dev/null || true
          tar -czhf "$GITHUB_WORKSPACE/openclaw-dist.tar.gz" \
            --warning=no-file-removed \
            --exclude='ui/node_modules' \
            --exclude='ui/src' \
            --exclude='ui/public' \
            --exclude='ui/.vite' \
            dist openclaw.mjs package.json pnpm-workspace.yaml node_modules \
            $( [ -d ui/dist ] && echo ui ) \
            $( [ -d docs/reference/templates ] && echo docs/reference/templates ) \
            $( [ -f pnpm-lock.yaml ] && echo pnpm-lock.yaml )

      - name: Publish to per-run prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ci-${{ github.run_id }}
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --prerelease \
                 --target "$GITHUB_SHA" \
                 --title  "CI build ${{ github.run_id }} ($GITHUB_SHA)" \
                 --notes  "Auto-published build artifacts. Pulled by deploy/install-openclaw-cluster.sh."
          gh release upload "$TAG" "openclaw-dist.tar.gz" \
            --repo "$GITHUB_REPOSITORY" --clobber

  paperclip:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: paperclip
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: paperclip/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # Ship built output. The server entrypoint is server/dist/index.js.
      # Workspace symlinks (server/node_modules/@paperclipai/* → ../../packages/*)
      # require packages/ at the same relative path, so include the whole
      # monorepo structure but strip source, caches, and dev tooling.
      - name: Package built output
        run: |
          tar -czf "$GITHUB_WORKSPACE/paperclip-dist.tar.gz" \
            --exclude='**/node_modules/.cache' \
            --exclude='**/.turbo' \
            --exclude='**/.vite' \
            --exclude='**/playwright-report' \
            --exclude='**/test-results' \
            --exclude='server/src' \
            --exclude='packages/*/src' \
            --exclude='ui/src' \
            --exclude='**/*.tsbuildinfo' \
            --exclude='scripts' \
            --exclude='cli' \
            --exclude='evals' \
            --exclude='doc' \
            --exclude='docs' \
            --exclude='tests' \
            .

      - name: Publish to per-run prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ci-${{ github.run_id }}
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --prerelease \
                 --target "$GITHUB_SHA" \
                 --title  "CI build ${{ github.run_id }} ($GITHUB_SHA)" \
                 --notes  "Auto-published build artifacts. Pulled by deploy/install-openclaw-cluster.sh."
          gh release upload "$TAG" "paperclip-dist.tar.gz" \
            --repo "$GITHUB_REPOSITORY" --clobber

  code-server:
    needs: detect
    if: needs.detect.outputs.code-server == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    defaults:
      run:
        working-directory: code-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install system deps for native modules
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libx11-dev libxkbfile-dev \
            libsecret-1-dev libkrb5-dev python3 jq quilt rsync

      # The "flatten subrepos" commit stripped the upstream ci/build/ scripts
      # and the lib/vscode/ submodule. Re-hydrate both from the matching
      # upstream tag (v4.118.0) before building, so local patches/ apply
      # against the right vscode tree.
      - name: Rehydrate ci/build and lib/vscode from upstream v4.118.0
        run: |
          set -eux
          if [ ! -x ./ci/build/build-code-server.sh ]; then
            mkdir -p ci/build
            base="https://raw.githubusercontent.com/coder/code-server/v4.118.0/ci/build"
            for f in build-code-server.sh build-vscode.sh build-release.sh \
                     build-static-release.sh clean.sh code-server.sh \
                     npm-postinstall.sh release-prep.sh test-plugin.sh; do
              curl -fsSL "$base/$f" -o "ci/build/$f" && chmod +x "ci/build/$f" || true
            done
            # The upstream build-vscode.sh references a gulp task name
            # (compile-copilot-extension-full-build) that the v4.118.0 vscode
            # submodule does not define. Align with the actual task name.
            sed -i 's/compile-copilot-extension-full-build/compile-copilot-extension-build/g' \
              ci/build/build-vscode.sh
          fi
          if [ ! -f lib/vscode/package.json ]; then
            mkdir -p lib
            # vscode's postinstall runs `git config` and requires lib/vscode
            # to be a real git repo, so clone the submodule directly in place
            # (keeping its .git) rather than rsyncing the working tree.
            tmp=$(mktemp -d)
            git clone --depth 1 --branch v4.118.0 \
              https://github.com/coder/code-server.git "$tmp/cs"
            submodule_sha=$(git -C "$tmp/cs" ls-tree HEAD lib/vscode | awk '{print $3}')
            submodule_url=$(git -C "$tmp/cs" config --file .gitmodules submodule.lib/vscode.url)
            rm -rf lib/vscode
            git clone "$submodule_url" lib/vscode
            git -C lib/vscode checkout --detach "$submodule_sha"
            rm -rf "$tmp"
          fi

      - run: npm ci

      # Apply the in-repo code-server patches to the vscode tree. Without
      # these, server-main.js never exports loadCodeWithNls and the wrapper
      # at runtime errors with "mod.loadCodeWithNls is not a function".
      # Apply patches with plain `patch -p1` rather than quilt: quilt halts
      # the whole series on the first hunk conflict, but one custom patch
      # (external-file-actions.diff) drifted from this vscode SHA on one
      # hunk. `patch --forward --batch` lets us keep going and still get
      # loadCodeWithNls into server-main.ts (the only patch code-server's
      # boot path actually requires).
      - name: Apply code-server patches to vscode
        run: |
          fails=0
          for p in $(grep -Ev '^[[:space:]]*$|^#' patches/series); do
            if ! patch -p1 --forward --batch --ignore-whitespace -r- -i "patches/$p" >/dev/null 2>&1; then
              echo "::warning::patch $p had conflicts (continuing)"
              fails=$((fails+1))
            fi
          done
          echo "patches applied with $fails non-fatal conflicts"
          grep -q "loadCodeWithNls" lib/vscode/src/server-main.ts \
            || { echo "::error::loadCodeWithNls did not land — code-server will not boot"; exit 1; }
          # external-file-actions.diff's import-line hunk drifts on this
          # vscode SHA, but its declaration/binding hunks land — so the
          # symbols exist in contextkeys.ts but aren't imported into
          # fileActions.contribution.ts. Inject the two names so tsc passes.
          fa=lib/vscode/src/vs/workbench/contrib/files/browser/fileActions.contribution.ts
          if ! grep -E "^import .*IsEnabledFileDownloads.* from '\\.\\./\\.\\./\\.\\./common/contextkeys" "$fa" >/dev/null; then
            sed -i "s|} from '\\.\\./\\.\\./\\.\\./common/contextkeys\\.js';|, IsEnabledFileDownloads, IsEnabledFileUploads & |" "$fa"
            grep -E "^import .*IsEnabledFileDownloads.* from '\\.\\./\\.\\./\\.\\./common/contextkeys" "$fa" >/dev/null \
              || { echo "::error::failed to inject IsEnabledFileDownloads into import"; exit 1; }
          fi

      # TS 6+ errors on moduleResolution=node/node10, downlevelIteration, and
      # inferred rootDir (TS5107/TS5101/TS5011). Walk lib/vscode AND the
      # code-server root, inject ignoreDeprecations + an explicit rootDir.
      - name: Patch tsconfigs for TS 6 compat
        run: |
          python3 - <<'PY'
          import os, re
          roots = ["lib/vscode", "."]
          patched = 0
          for root in roots:
              for dp, _, fs in os.walk(root):
                  if "/node_modules/" in dp or dp.endswith("/node_modules") \
                     or "/lib/vscode/" in dp + "/" and root == ".":
                      continue
                  for fn in fs:
                      if not fn.startswith("tsconfig") or not fn.endswith(".json"):
                          continue
                      fp = os.path.join(dp, fn)
                      with open(fp) as h:
                          s = h.read()
                      changed = False
                      if "ignoreDeprecations" not in s:
                          s, n = re.subn(
                              r'("compilerOptions"\s*:\s*\{)',
                              r'\1\n    "ignoreDeprecations": "6.0",',
                              s, count=1,
                          )
                          if n: changed = True
                      # Add rootDir: "./src" when include points at ./src and no
                      # rootDir is set yet (silences TS5011).
                      if '"rootDir"' not in s and './src' in s:
                          s, n = re.subn(
                              r'("compilerOptions"\s*:\s*\{)',
                              r'\1\n    "rootDir": "./src",',
                              s, count=1,
                          )
                          if n: changed = True
                      if changed:
                          with open(fp, "w") as h:
                              h.write(s)
                          patched += 1
          print(f"patched {patched} tsconfigs")
          PY

      # build-vscode.sh runs `npm run gulp core-ci`, which kicks off three
      # esbuild bundles in parallel (desktop, reh-min, reh-web-min). Each
      # uses several GB of RSS (V8 heap caps don't bound esbuild's native
      # allocations), so even one of the bundles can OOM the runner. The
      # follow-up step `vscode-reh-web-...-min-ci` is what produces the
      # output code-server actually consumes; the desktop and server-only
      # bundles aren't used. Drop the parallel-bundle step.
      # The 3 esbuild bundle tasks inside core-ci run in parallel and
      # OOM the runner. Force vscode's gulpfile to run them serially.
      # gulp.parallel(...) for the bundles becomes gulp.series(...).
      - name: Serialize vscode's parallel bundle tasks
        # Find the task.parallel(...) call that contains
        # 'esbuild-vscode-reh-web-min' and rewrite it to task.series(...).
        # The call spans multiple lines and wraps `task.define(...)`
        # expressions, so do paren-balanced replacement in Python.
        run: |
          python3 - <<'PY'
          import pathlib, sys
          target_marker = "esbuild-vscode-reh-web-min"
          edits = 0
          for fp in pathlib.Path("lib/vscode/build").rglob("gulpfile*.ts"):
              s = fp.read_text()
              i = 0
              out = []
              while True:
                  j = s.find("task.parallel(", i)
                  if j < 0:
                      out.append(s[i:]); break
                  # Find matching closing paren starting after "task.parallel("
                  k = j + len("task.parallel(")
                  depth = 1
                  while k < len(s) and depth:
                      c = s[k]
                      if c == "(": depth += 1
                      elif c == ")": depth -= 1
                      k += 1
                  body = s[j+len("task.parallel("):k-1]
                  out.append(s[i:j])
                  if target_marker in body:
                      out.append("task.series(" + body + ")")
                      edits += 1
                  else:
                      out.append(s[j:k])
                  i = k
              if edits and "".join(out) != s:
                  fp.write_text("".join(out))
                  print(f"patched {fp}")
          if edits == 0:
              print("::error::no task.parallel(...) containing esbuild-vscode-reh-web-min found")
              sys.exit(1)
          print(f"serialized {edits} parallel block(s)")
          PY

      # build-code-server.sh wraps the outer code-server but assumes vscode
      # has already been built into lib/vscode/out/. Run build-vscode.sh first.
      # build-vscode.sh requires VERSION; the value is just embedded in
      # product.json, so any placeholder is fine for a self-hosted build.
      - name: Build vscode (lib/vscode/out)
        env:
          VERSION: '0.0.0'
        run: ./ci/build/build-vscode.sh

      - name: Build code-server
        env:
          VERSION: '0.0.0'
        run: ./ci/build/build-code-server.sh

      # The wrapper imports lib/vscode/out/server-main.js. The build leaves
      # only out/vs/ here; the bundled server lives at
      # lib/vscode/out-vscode-reh-web-min/. Replace the dir with a symlink
      # so the wrapper resolves correctly without prod-side fixup.
      - name: Link lib/vscode/out to the reh-web bundle
        run: |
          if [ -d lib/vscode/out-vscode-reh-web-min ]; then
            rm -rf lib/vscode/out
            ln -s out-vscode-reh-web-min lib/vscode/out
          fi

      - name: Package
        run: |
          tar -czf "$GITHUB_WORKSPACE/code-server-dist.tar.gz" \
            --exclude='.git' \
            --exclude='test' \
            --exclude='**/*.map' \
            $( [ -d out ] && echo out ) \
            $( [ -d lib ] && echo lib ) \
            $( [ -d patches ] && echo patches ) \
            node_modules package.json package-lock.json

      - name: Publish to per-run prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ci-${{ github.run_id }}
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --prerelease \
                 --target "$GITHUB_SHA" \
                 --title  "CI build ${{ github.run_id }} ($GITHUB_SHA)" \
                 --notes  "Auto-published build artifacts. Pulled by deploy/install-openclaw-cluster.sh."
          gh release upload "$TAG" "code-server-dist.tar.gz" \
            --repo "$GITHUB_REPOSITORY" --clobber

  # Runs when detect says code-server/** was untouched. Walks recent CI
  # prereleases until it finds one with code-server-dist.tar.gz, downloads
  # that asset, and re-uploads it to this run's release. Keeps each
  # ci-<run_id> release self-contained (all four tarballs) so the install
  # script needs no fallback logic.
  code-server-passthrough:
    needs: detect
    if: needs.detect.outputs.code-server == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Republish prior code-server-dist
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ci-${{ github.run_id }}
        run: |
          set -euo pipefail
          prev_tag=""
          for t in $(gh release list --repo "$GITHUB_REPOSITORY" -L 30 \
                       --json tagName,isPrerelease \
                       -q '.[] | select(.isPrerelease and (.tagName | startswith("ci-"))) | .tagName'); do
            if gh release view "$t" --repo "$GITHUB_REPOSITORY" --json assets \
                 -q '[.assets[].name][]' 2>/dev/null | grep -qx 'code-server-dist.tar.gz'; then
              prev_tag="$t"; break
            fi
          done
          if [ -z "$prev_tag" ]; then
            echo "::error::no prior CI prerelease has code-server-dist.tar.gz"
            echo "::error::detect should have forced a build — please re-run with workflow_dispatch"
            exit 1
          fi
          echo "Reusing code-server-dist from $prev_tag"
          workdir=$(mktemp -d)
          cd "$workdir"
          gh release download "$prev_tag" --repo "$GITHUB_REPOSITORY" -p code-server-dist.tar.gz
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --prerelease \
                 --target "$GITHUB_SHA" \
                 --title  "CI build ${{ github.run_id }} ($GITHUB_SHA)" \
                 --notes  "Auto-published build artifacts. code-server-dist sourced from $prev_tag (no code-server/** changes since)."
          gh release upload "$TAG" code-server-dist.tar.gz --repo "$GITHUB_REPOSITORY" --clobber
          echo "OK: republished code-server-dist from $prev_tag → $TAG"
