name: build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  openclaw:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: openclaw
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.0

      # No `cache:` — openclaw/pnpm-lock.yaml isn't committed and the cache
      # action errors out when the dependency path is absent.
      - uses: actions/setup-node@v4
        with:
          node-version: '22.16'

      # pnpm-workspace.yaml sets minimumReleaseAge: 2880, which requires the
      # registry "time" field on every resolved package. npm_config_ env
      # overrides do not apply to workspace YAML in pnpm 11, so we sed-strip
      # the line in CI only.
      - name: Disable minimumReleaseAge for CI
        run: |
          sed -i '/^minimumReleaseAge:/d' pnpm-workspace.yaml
          sed -i '/^minimumReleaseAgeExclude:/,/^[^[:space:]-]/{/^[[:space:]-]/d; /^minimumReleaseAgeExclude:/d}' pnpm-workspace.yaml || true
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build

      # dist/ imports runtime externals like `json5`. Re-install with --prod
      # so node_modules only contains what production needs, then tar it
      # alongside dist/. -h dereferences pnpm's symlinks for a portable
      # archive.
      - name: Install prod node_modules
        env:
          NODE_ENV: production
        run: pnpm install --no-frozen-lockfile --prod

      - name: Package
        run: |
          # pnpm --prod left dangling .bin symlinks (devDep entries) which
          # break `tar -h`. Sweep them first.
          find node_modules -xtype l -delete 2>/dev/null || true
          tar -czhf "$GITHUB_WORKSPACE/openclaw-dist.tar.gz" \
            --warning=no-file-removed \
            dist openclaw.mjs package.json pnpm-workspace.yaml node_modules \
            $( [ -f pnpm-lock.yaml ] && echo pnpm-lock.yaml )

      - uses: actions/upload-artifact@v4
        with:
          name: openclaw-dist
          path: openclaw-dist.tar.gz
          retention-days: 14
          if-no-files-found: error

  paperclip:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: paperclip
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: paperclip/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      # bring-up.sh runs paperclip via `pnpm dev` (tsx watch), not a built
      # artifact, so we ship source + node_modules and let the systemd unit
      # do the same. `pnpm build` currently fails type-check on this fork.
      - name: Package source + node_modules
        run: |
          tar -czf "$GITHUB_WORKSPACE/paperclip-dist.tar.gz" \
            --exclude='**/node_modules/.cache' \
            --exclude='**/.turbo' \
            --exclude='**/.vite' \
            --exclude='**/playwright-report' \
            --exclude='**/test-results' \
            .

      - uses: actions/upload-artifact@v4
        with:
          name: paperclip-dist
          path: paperclip-dist.tar.gz
          retention-days: 14
          if-no-files-found: error

  code-server:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: code-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install system deps for native modules
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libx11-dev libxkbfile-dev \
            libsecret-1-dev libkrb5-dev python3 jq quilt rsync

      # The "flatten subrepos" commit stripped the upstream ci/build/ scripts
      # and the lib/vscode/ submodule. Re-hydrate both from the matching
      # upstream tag (v4.118.0) before building, so local patches/ apply
      # against the right vscode tree.
      - name: Rehydrate ci/build and lib/vscode from upstream v4.118.0
        run: |
          set -eux
          if [ ! -x ./ci/build/build-code-server.sh ]; then
            mkdir -p ci/build
            base="https://raw.githubusercontent.com/coder/code-server/v4.118.0/ci/build"
            for f in build-code-server.sh build-vscode.sh build-release.sh \
                     build-static-release.sh clean.sh code-server.sh \
                     npm-postinstall.sh release-prep.sh test-plugin.sh; do
              curl -fsSL "$base/$f" -o "ci/build/$f" && chmod +x "ci/build/$f" || true
            done
            # The upstream build-vscode.sh references a gulp task name
            # (compile-copilot-extension-full-build) that the v4.118.0 vscode
            # submodule does not define. Align with the actual task name.
            sed -i 's/compile-copilot-extension-full-build/compile-copilot-extension-build/g' \
              ci/build/build-vscode.sh
          fi
          if [ ! -f lib/vscode/package.json ]; then
            mkdir -p lib
            # vscode's postinstall runs `git config` and requires lib/vscode
            # to be a real git repo, so clone the submodule directly in place
            # (keeping its .git) rather than rsyncing the working tree.
            tmp=$(mktemp -d)
            git clone --depth 1 --branch v4.118.0 \
              https://github.com/coder/code-server.git "$tmp/cs"
            submodule_sha=$(git -C "$tmp/cs" ls-tree HEAD lib/vscode | awk '{print $3}')
            submodule_url=$(git -C "$tmp/cs" config --file .gitmodules submodule.lib/vscode.url)
            rm -rf lib/vscode
            git clone "$submodule_url" lib/vscode
            git -C lib/vscode checkout --detach "$submodule_sha"
            rm -rf "$tmp"
          fi

      - run: npm ci

      # Apply the in-repo code-server patches to the vscode tree. Without
      # these, server-main.js never exports loadCodeWithNls and the wrapper
      # at runtime errors with "mod.loadCodeWithNls is not a function".
      - name: Apply code-server patches to vscode
        env:
          QUILT_PATCHES: patches
        # Patches have paths like code-server/lib/vscode/..., so after the
        # default -p1 strip they resolve against the code-server/ root.
        run: quilt push -a

      # TS 6+ errors on moduleResolution=node/node10, downlevelIteration, and
      # inferred rootDir (TS5107/TS5101/TS5011). Walk lib/vscode AND the
      # code-server root, inject ignoreDeprecations + an explicit rootDir.
      - name: Patch tsconfigs for TS 6 compat
        run: |
          python3 - <<'PY'
          import os, re
          roots = ["lib/vscode", "."]
          patched = 0
          for root in roots:
              for dp, _, fs in os.walk(root):
                  if "/node_modules/" in dp or dp.endswith("/node_modules") \
                     or "/lib/vscode/" in dp + "/" and root == ".":
                      continue
                  for fn in fs:
                      if not fn.startswith("tsconfig") or not fn.endswith(".json"):
                          continue
                      fp = os.path.join(dp, fn)
                      with open(fp) as h:
                          s = h.read()
                      changed = False
                      if "ignoreDeprecations" not in s:
                          s, n = re.subn(
                              r'("compilerOptions"\s*:\s*\{)',
                              r'\1\n    "ignoreDeprecations": "6.0",',
                              s, count=1,
                          )
                          if n: changed = True
                      # Add rootDir: "./src" when include points at ./src and no
                      # rootDir is set yet (silences TS5011).
                      if '"rootDir"' not in s and './src' in s:
                          s, n = re.subn(
                              r'("compilerOptions"\s*:\s*\{)',
                              r'\1\n    "rootDir": "./src",',
                              s, count=1,
                          )
                          if n: changed = True
                      if changed:
                          with open(fp, "w") as h:
                              h.write(s)
                          patched += 1
          print(f"patched {patched} tsconfigs")
          PY

      # build-code-server.sh wraps the outer code-server but assumes vscode
      # has already been built into lib/vscode/out/. Run build-vscode.sh first.
      # build-vscode.sh requires VERSION; the value is just embedded in
      # product.json, so any placeholder is fine for a self-hosted build.
      - name: Build vscode (lib/vscode/out)
        env:
          VERSION: '0.0.0'
        run: ./ci/build/build-vscode.sh

      - name: Build code-server
        env:
          VERSION: '0.0.0'
        run: ./ci/build/build-code-server.sh

      - name: Package
        run: |
          tar -czf "$GITHUB_WORKSPACE/code-server-dist.tar.gz" \
            --exclude='.git' \
            --exclude='test' \
            --exclude='**/*.map' \
            $( [ -d out ] && echo out ) \
            $( [ -d lib ] && echo lib ) \
            $( [ -d patches ] && echo patches ) \
            node_modules package.json package-lock.json

      - uses: actions/upload-artifact@v4
        with:
          name: code-server-dist
          path: code-server-dist.tar.gz
          retention-days: 14
          if-no-files-found: error
